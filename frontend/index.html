<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plataforma de Adoção Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    :root {
      --cream: #FAF7F2;
      --warm-white: #FFFDF9;
      --terracotta: #C4622D;
      --terracotta-light: #E8845A;
      --terracotta-dark: #9A4520;
      --forest: #2D5016;
      --forest-light: #4A7A28;
      --sand: #D4B896;
      --sand-light: #EDD9C0;
      --charcoal: #2C2C2C;
      --gray-mid: #7A7A7A;
      --gray-light: #E8E3DC;
      --danger: #B33A3A;
      --success: #2D7A45;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream) url('./background.jpg') center/cover no-repeat fixed;
      color: var(--charcoal);
      min-height: 100vh;
    }

    /* SIDEBAR */
    #app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px;
      background: var(--charcoal);
      display: flex;
      flex-direction: column;
      padding: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }

    .login-wrap {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--charcoal);
      padding: 20px 0;
      flex: 1 1 auto;
    }

    .login-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 22px;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      overflow: hidden;
    }

    .login-tab {
      flex: 1;
      padding: 12px 14px;
      border: none;
      background: var(--gray-light);
      color: var(--charcoal);
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.18s, color 0.18s;
    }

    .login-tab.active {
      background: var(--terracotta);
      color: white;
    }

    .login-tab:not(.active):hover {
      background: #f5f2ef;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--sand-light);
      line-height: 1.3;
    }

    .sidebar-logo p {
      font-size: 0.72rem;
      color: var(--gray-mid);
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .sidebar-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      min-width: 0;
    }

    .sidebar-collapse-btn {
      border: none;
      background: transparent;
      color: var(--sand-light);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 10px;
      transition: background 0.18s, transform 0.18s;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .sidebar-collapse-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .sidebar-logo-img {
      width: 48px;
      height: auto;
      flex-shrink: 0;
    }

    .sidebar-logo-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.1;
    }

    .sidebar-logo-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--sand-light);
      margin: 0;
    }

    .sidebar-logo-text p {
      margin: 0;
    }

    .sidebar.collapsed {
      width: 60px;
    }

    .sidebar.collapsed .sidebar-logo {
      justify-content: center;
      padding: 18px 8px;
      gap: 6px;
    }

    .sidebar.collapsed .sidebar-logo-text {
      display: none;
    }

    .sidebar.collapsed .sidebar-footer {
      display: none;
    }

    .sidebar.collapsed .sidebar-logo-img {
      width: 28px;
    }

    .sidebar.collapsed .sidebar-collapse-btn {
      transform: rotate(180deg);
    }

    .sidebar.collapsed .nav-text { display: none; }
    .sidebar.collapsed .nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
    .sidebar.collapsed .nav-label { display: none; }

    .nav-section {
      padding: 16px 0 8px;
    }

    .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gray-mid);
      padding: 0 24px 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      font-size: 0.88rem;
      font-weight: 400;
      transition: all 0.18s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.9); }
    .nav-item.active {
      color: var(--sand-light);
      background: rgba(196,98,45,0.15);
      border-left-color: var(--terracotta);
      font-weight: 500;
    }

    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.75rem;
      color: var(--gray-mid);
    }

    /* MAIN */
    .main {
      margin-left: 260px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .main.sidebar-collapsed {
      margin-left: 60px;
    }

    .topbar {
      background: var(--warm-white);
      border-bottom: 1px solid var(--gray-light);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--charcoal);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-badge {
      background: var(--terracotta);
      color: white;
      font-size: 0.72rem;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .topbar-logout {
      background: transparent;
      color: var(--charcoal);
      border: 1px solid var(--gray-light);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      font-size: 0.85rem;
    }

    .topbar-logout:hover {
      background: var(--gray-light);
      color: var(--charcoal);
      border-color: var(--charcoal);
    }

    .content { padding: 36px 40px; flex: 1; }

    /* CARDS DASHBOARD */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--gray-light);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .stat-card.orange::before { background: var(--terracotta); }
    .stat-card.green::before { background: var(--forest-light); }
    .stat-card.sand::before { background: var(--sand); }
    .stat-card.dark::before { background: var(--charcoal); }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gray-mid);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      color: var(--charcoal);
      line-height: 1;
    }

    .stat-sub { font-size: 0.78rem; color: var(--gray-mid); margin-top: 6px; }

    /* TABLE */
    .table-card {
      background: white;
      border-radius: 12px;
      border: 1px solid var(--gray-light);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--gray-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--cream);
      padding: 12px 16px;
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gray-mid);
      font-weight: 500;
    }

    td {
      padding: 14px 16px;
      border-top: 1px solid var(--gray-light);
      font-size: 0.88rem;
    }

    tr:hover td { background: #FAFAF8; }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .badge-green { background: #E8F5EE; color: var(--success); }
    .badge-orange { background: #FDF0E8; color: var(--terracotta-dark); }
    .badge-gray { background: var(--gray-light); color: var(--gray-mid); }
    .badge-blue { background: #E8EFF8; color: #2D5080; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      font-family: inherit;
    }

    .btn-primary { background: var(--terracotta); color: white; }
    .btn-primary:hover { background: var(--terracotta-dark); }
    .btn-ghost { background: transparent; color: var(--charcoal); border: 1px solid var(--gray-light); }
    .btn-ghost:hover { background: var(--gray-light); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid #f0d4d4; }
    .btn-danger:hover { background: #fdf0f0; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: var(--forest); }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; }

    /* FORM */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 480px;
      max-width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--gray-mid);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--gray-light);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--cream);
      transition: border 0.18s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--terracotta);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* ALERT */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
    .alert-success { background: #E8F5EE; color: var(--success); border: 1px solid #b8dfc7; }
    .alert-error { background: #FDF0F0; color: var(--danger); border: 1px solid #f0c8c8; }

    /* LOGIN */

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 420px;
      max-width: 90vw;
    }

    .login-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: var(--terracotta);
      margin-bottom: 4px;
      text-align: center;
    }

    .login-sub {
      font-size: 0.82rem;
      color: var(--gray-mid);
      margin-bottom: 32px;
      letter-spacing: 0.03em;
      text-align: center;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--gray-mid);
      font-size: 0.9rem;
    }

    .empty {
      text-align: center;
      padding: 48px;
      color: var(--gray-mid);
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: 0.88rem; }
  </style>
</head>
<body>
<div id="app">

  <div v-if="!logado" class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Cursoor</div>
      <div class="login-sub">Plataforma de Adoção e Convivência · UNINASSAU</div>

      <div class="login-tabs">
        <button type="button" class="login-tab" :class="{active: !cadastro}" @click="cadastro = false">Entrar</button>
        <button type="button" class="login-tab" :class="{active: cadastro}" @click="cadastro = true">Criar conta</button>
      </div>

      <div v-if="loginErro" class="alert alert-error">{{ loginErro }}</div>
      <div v-if="registroSucesso" class="alert alert-success">{{ registroSucesso }}</div>

      <template v-if="!cadastro">
        <div class="form-group">
          <label>Login</label>
          <input v-model="loginForm.login" type="text" @keyup.enter="fazerLogin">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input v-model="loginForm.senha" type="password" @keyup.enter="fazerLogin">
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" @click="fazerLogin">
          Entrar na plataforma
        </button>
        <p style="margin-top:16px;font-size:0.78rem;color:var(--gray-mid);text-align:center">
          Acesso restrito a servidores autorizados
        </p>
      </template>

      <template v-else>
        <div class="form-group">
          <label>Login</label>
          <input v-model="registroForm.login" type="text">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input v-model="registroForm.senha" type="password">
        </div>
        <div class="form-group">
          <label>Perfil</label>
          <select v-model="registroForm.perfil">
            <option>Governo</option>
            <option>Assistente Social</option>
          </select>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" @click="criarConta">
          Criar conta
        </button>
        <p style="margin-top:16px;font-size:0.78rem;color:var(--gray-mid);text-align:center">
          Já tem conta? <button type="button" class="btn btn-ghost btn-sm" style="padding:4px 8px;margin-top:4px" @click="cadastro = false">Entrar</button>
        </p>
      </template>
    </div>
  </div>

  <template v-else>
    <nav class="sidebar" :class="{ collapsed: sidebarCollapsed }">
      <div class="sidebar-logo">
        <button type="button" class="sidebar-collapse-btn" @click="toggleSidebar" title="Retrair sidebar">☰</button>
        <img src="./logo.svg" alt="Logo Cursoor" class="sidebar-logo-img">
        <div class="sidebar-logo-text">
          <h1>Cursoor</h1>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Visão Geral</div>
        <div class="nav-item" :class="{active: tela==='dashboard'}" @click="tela='dashboard'">
          <span class="nav-icon">📊</span><span class="nav-text"> Dashboard</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Gestão</div>
        <div class="nav-item" :class="{active: tela==='criancas'}" @click="irPara('criancas')">
          <span class="nav-icon">👶</span><span class="nav-text"> Crianças</span>
        </div>
        <div class="nav-item" :class="{active: tela==='adotantes'}" @click="irPara('adotantes')">
          <span class="nav-icon">👨‍👩‍👧</span><span class="nav-text"> Adotantes</span>
        </div>
        <div class="nav-item" :class="{active: tela==='instituicoes'}" @click="irPara('instituicoes')">
          <span class="nav-icon">🏛️</span><span class="nav-text"> Instituições</span>
        </div>
        <div class="nav-item" :class="{active: tela==='processos'}" @click="irPara('processos')">
          <span class="nav-icon">📋</span><span class="nav-text"> Processos</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Convivência</div>
        <div class="nav-item" :class="{active: tela==='cursos'}" @click="irPara('cursos')">
          <span class="nav-icon">📚</span><span class="nav-text"> Cursos</span>
        </div>
        <div class="nav-item" :class="{active: tela==='matriculas'}" @click="irPara('matriculas')">
          <span class="nav-icon">✏️</span><span class="nav-text"> Matrículas</span>
        </div>
        <div class="nav-item" :class="{active: tela==='compatibilidade'}" @click="irPara('compatibilidade')">
          <span class="nav-icon">🔗</span><span class="nav-text"> Compatibilidade</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Administração</div>
        <div class="nav-item" :class="{active: tela==='usuarios'}" @click="irPara('usuarios')">
          <span class="nav-icon">👤</span><span class="nav-text"> Usuários</span>
        </div>
      </div>

      <div class="sidebar-footer">
        <div>{{ usuario?.login }}</div>
        <div style="color:var(--sand-light);font-size:0.68rem">{{ usuario?.perfil }}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:10px;color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.1)" @click="sair">Sair</button>
      </div>
    </nav>

    <div class="main" :class="{ 'sidebar-collapsed': sidebarCollapsed }">
      <div class="topbar">
        <h2>{{ tituloTela }}</h2>
        <div class="topbar-actions">
          <span class="topbar-badge">{{ usuario?.perfil }}</span>
          <button type="button" class="topbar-logout" @click="sair">Sair</button>
        </div>
      </div>

      <div class="content">

        <div v-if="tela==='dashboard'">
          <div v-if="loadingDash" class="loading">Carregando estatísticas...</div>
          <template v-else>
            <div class="stats-grid">
              <div class="stat-card orange">
                <div class="stat-label">Crianças cadastradas</div>
                <div class="stat-value">{{ dash.criancas?.total || 0 }}</div>
                <div class="stat-sub">{{ dash.criancas?.disponiveis || 0 }} disponíveis</div>
              </div>
              <div class="stat-card green">
                <div class="stat-label">Adotantes habilitados</div>
                <div class="stat-value">{{ dash.adotantes?.total || 0 }}</div>
              </div>
              <div class="stat-card sand">
                <div class="stat-label">Cursos de convivência</div>
                <div class="stat-value">{{ dash.cursos?.total || 0 }}</div>
                <div class="stat-sub">{{ dash.cursos?.aprovados || 0 }} aprovados · {{ dash.cursos?.pendentes || 0 }} pendentes</div>
              </div>
              <div class="stat-card dark">
                <div class="stat-label">Matrículas</div>
                <div class="stat-value">{{ dash.matriculas?.total || 0 }}</div>
              </div>
              <div class="stat-card orange">
                <div class="stat-label">Processos de adoção</div>
                <div class="stat-value">{{ dash.processos?.total || 0 }}</div>
                <div class="stat-sub">{{ dash.processos?.concluidos || 0 }} concluídos</div>
              </div>
            </div>
          </template>
        </div>

        <div v-if="tela==='criancas'">
          <div class="table-card">
            <div class="table-header">
              <span class="table-title">Crianças em Acolhimento</span>
              <button class="btn btn-primary btn-sm" @click="abrirModal('criancas')">+ Nova Criança</button>
            </div>
            <div v-if="loading" class="loading">Carregando...</div>
            <div v-else-if="lista.length===0" class="empty">
              <div class="empty-icon">👶</div>
              <p>Nenhuma criança cadastrada ainda.</p>
            </div>
            <table v-else>
              <thead>
                <tr><th>ID</th><th>Nome</th><th>Idade</th><th>Sexo</th><th>Status</th><th>Ações</th></tr>
              </thead>
              <tbody>
                <tr v-for="c in lista" :key="c.id_crianca">
                  <td style="color:var(--gray-mid)">#{{ c.id_crianca }}</td>
                  <td><strong>{{ c.nome }}</strong></td>
                  <td>{{ c.idade }} anos</td>
                  <td>{{ c.sexo }}</td>
                  <td>
                    <span class="badge" :class="c.status==='disponível'?'badge-green':'badge-orange'">{{ c.status }}</span>
                  </td>
                  <td>
                    <button class="btn btn-ghost btn-sm" @click="abrirEdicao('criancas', c)">Editar</button>
                    <button class="btn btn-danger btn-sm" style="margin-left:6px" @click="deletar('criancas', c.id_crianca)">Excluir</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div v-if="tela==='adotantes'">
          <div class="table-card">
            <div class="table-header">
              <span class="table-title">Pretendentes Habilitados</span>

          </div>

                <option disabled value="">Selecione</option>
                <option v-for="c in listaCriancas" :key="c.id_crianca" :value="c.id_crianca">
                  {{ c.nome }}
                </option>
              </select>
            </div>
            <div class="form-group">
              <label>Adotante</label>
              <select v-model.number="form.id_adotante">
                <option disabled value="">Selecione</option>
                <option v-for="a in listaAdotantes" :key="a.id_adotante" :value="a.id_adotante">
                  {{ a.nome }}
                </option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Nível Teórico (0-10)</label><input v-model.number="form.nivel_teorico" type="number" step="0.1" min="0" max="10"></div>
            <div class="form-group"><label>Nível Prático (0-10)</label><input v-model.number="form.nivel_pratico" type="number" step="0.1" min="0" max="10"></div>
          </div>
        </template>

        <template v-if="tela==='usuarios'">
          <div class="form-group"><label>Login</label><input v-model="form.login" placeholder="usuario.login"></div>
          <div class="form-group"><label>Senha</label><input v-model="form.senha" type="password" placeholder="••••••••"></div>
          <div class="form-group"><label>Perfil</label>
            <select v-model="form.perfil"><option>Governo</option><option>Assistente Social</option></select>
          </div>
        </template>

        <div class="form-actions">
          <button class="btn btn-ghost" @click="fecharModal">Cancelar</button>
          <button class="btn btn-primary" @click="salvar">{{ editando ? 'Salvar alterações' : 'Cadastrar' }}</button>
        </div>
      </div>
    </div>

  </template>
</div>

<script>
const { createApp, ref, computed } = Vue;

const API = window.location.hostname === 'cursoor.vercel.app'
  ? 'https://cursoor.onrender.com'
  : 'http://localhost:8000';

createApp({
  setup() {
    const logado = ref(false);
    const usuario = ref(null);
    const loginForm = ref({ login: '', senha: '' });
    const registroForm = ref({ login: '', senha: '', perfil: 'Governo' });
    const loginErro = ref('');
    const registroSucesso = ref('');
    const cadastro = ref(false);
    const sidebarCollapsed = ref(false);

    const tela = ref('dashboard');
    const lista = ref([]);
    const listaInstituicoes = ref([]); 
    const listaCriancas = ref([]); // Nova lista para dropdowns
    const listaAdotantes = ref([]); // Nova lista para dropdowns
    const listaCursos = ref([]); // Nova lista para dropdowns
    const loading = ref(false);
    const loadingDash = ref(false);
    const dash = ref({});
    const modalAberto = ref(false);
    const editando = ref(null);
    const form = ref({});

    const rotas = {
      criancas: 'criancas',
      adotantes: 'adotantes',
      instituicoes: 'instituicoes',
      processos: 'processos',
      cursos: 'cursos',
      matriculas: 'matriculas',
      compatibilidade: 'compatibilidade',
      usuarios: 'usuarios',
    };

    const titulosMap = {
      dashboard: 'Dashboard',
      criancas: 'Crianças',
      adotantes: 'Adotantes',
      instituicoes: 'Instituições',
      processos: 'Processos de Adoção',
      cursos: 'Cursos de Convivência',
      matriculas: 'Matrículas',
      compatibilidade: 'Compatibilidade',
      usuarios: 'Usuários',
    };

    const tituloTela = computed(() => titulosMap[tela.value] || '');
    const tituloModal = computed(() => titulosMap[tela.value] || '');

    // Funções para carregar dados auxiliares para os dropdowns
    async function carregarAuxiliares() {
      try {
        const [rInst, rCri, rAdot, rCur] = await Promise.all([
          fetch(`${API}/instituicoes/`),
          fetch(`${API}/criancas/`),
          fetch(`${API}/adotantes/`),
          fetch(`${API}/cursos/`)
        ]);
        if (rInst.ok) listaInstituicoes.value = await rInst.json();
        if (rCri.ok) listaCriancas.value = await rCri.json();
        if (rAdot.ok) listaAdotantes.value = await rAdot.json();
        if (rCur.ok) listaCursos.value = await rCur.json();
      } catch (err) { console.error("Erro ao carregar dados auxiliares:", err); }
    }

    async function fazerLogin() {
      loginErro.value = '';
      registroSucesso.value = '';
      try {
        const r = await fetch(`${API}/usuarios/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(loginForm.value)
        });
        if (!r.ok) { loginErro.value = 'Login ou senha inválidos.'; return; }
        usuario.value = await r.json();
        logado.value = true;
        carregarDashboard();
        carregarAuxiliares(); 
      } catch {
        loginErro.value = 'Não foi possível conectar ao servidor.';
      }
    }

    async function criarConta() {
      loginErro.value = '';
      registroSucesso.value = '';
      try {
        const r = await fetch(`${API}/usuarios/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(registroForm.value)
        });
        if (!r.ok) {
          const data = await r.json().catch(() => ({}));
          loginErro.value = data.detail || 'Erro ao criar conta.';
          return;
        }
        registroSucesso.value = 'Conta criada com sucesso! Faça login.';
        cadastro.value = false;
        registroForm.value = { login: '', senha: '', perfil: 'Governo' };
      } catch {
        loginErro.value = 'Não foi possível conectar ao servidor.';
      }
    }

    function sair() { logado.value = false; usuario.value = null; tela.value = 'dashboard'; cadastro.value = false; }

    function toggleSidebar() { sidebarCollapsed.value = !sidebarCollapsed.value; }

    async function carregarDashboard() {
      loadingDash.value = true;
      try {
        const r = await fetch(`${API}/relatorios/dashboard`);
        dash.value = await r.json();
      } catch {}
      loadingDash.value = false;
    }

    async function irPara(t) {
      tela.value = t;
      loading.value = true;
      lista.value = [];
      
      // Atualiza as listas auxiliares toda vez que mudar de tela de gestão
      carregarAuxiliares();

      try {
        const r = await fetch(`${API}/${rotas[t]}/`);
        lista.value = await r.json();
      } catch {}
      loading.value = false;
    }

    function abrirModal(t) {
      editando.value = null;
      // Inicializa campos de ID como string vazia para o dropdown funcionar com o placeholder
      form.value = { 
        id_instituicao: '', 
        id_crianca: '', 
        id_adotante: '', 
        id_adotante_instrutor: '', 
        id_curso: '',
        idade: t === 'adotantes' ? 18 : null // Começa com 18 anos se for adotante
      }; 
      modalAberto.value = true;
    }

    function abrirEdicao(t, item) {
      editando.value = item;
      form.value = { ...item };
      modalAberto.value = true;
    }

    function fecharModal() { modalAberto.value = false; editando.value = null; form.value = {}; }

    async function salvar() {
      const rota = rotas[tela.value];
      try {
        let r;
        if (editando.value) {
          const idKey = Object.keys(editando.value).find(k => k.startsWith('id_') || k === 'id');
          const id = editando.value[idKey];
          r = await fetch(`${API}/${rota}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form.value)
          });
        } else {
          r = await fetch(`${API}/${rota}/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form.value)
          });
        }
        if (r.ok) { fecharModal(); await irPara(tela.value); }
      } catch {}
    }

    async function deletar(rota, id) {
      if (!confirm('Confirmar exclusão?')) return;
      await fetch(`${API}/${rota}/${id}`, { method: 'DELETE' });
      await irPara(tela.value);
    }

    async function aprovarCurso(id) {
      await fetch(`${API}/cursos/${id}/aprovar`, { method: 'PUT' });
      await irPara('cursos');
    }

    async function concluirMatricula(id) {
      await fetch(`${API}/matriculas/${id}/concluir`, { method: 'PUT' });
      await irPara('matriculas');
    }

    return {
      logado, usuario, loginForm, registroForm, cadastro, loginErro, registroSucesso, fazerLogin, criarConta, sair,
      tela, tituloTela, tituloModal, lista, listaInstituicoes, listaCriancas, listaAdotantes, listaCursos, loading, loadingDash, dash,
      modalAberto, editando, form, sidebarCollapsed,
      irPara, abrirModal, abrirEdicao, fecharModal, salvar, deletar, toggleSidebar,
      aprovarCurso, concluirMatricula
    };
  }
}).mount('#app');
</script>
</body>
</html>
